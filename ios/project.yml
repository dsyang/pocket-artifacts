name: PocketArtifacts

options:
  bundleIdPrefix: com.dsyang
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: "1.17.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  PocketArtifacts:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: ComposableArchitecture
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dsyang.PocketArtifacts
        INFOPLIST_FILE: Support/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
    scheme:
      testTargets:
        - PocketArtifactsTests

  PocketArtifactsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: PocketArtifacts
      - package: ComposableArchitecture
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
