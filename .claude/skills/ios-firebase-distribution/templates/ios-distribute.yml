# Signed ad-hoc build → Firebase App Distribution. Installing = tapping
# the link in the Firebase App Tester invite — no Apple review or
# processing queue. Signing assets come from repo secrets (see the
# ios-firebase-distribution skill / repo README): ad-hoc cert .p12 +
# password, provisioning profile, Apple team ID, Firebase app ID +
# service account.
#
# Manual-only: trigger from the Actions tab ("Run workflow") when you
# want a build on your phone.
name: iOS Distribute (Firebase)

on:
  workflow_dispatch:

concurrency:
  group: ios-distribute-${{ github.ref }}
  cancel-in-progress: false

jobs:
  distribute:
    runs-on: __RUNNER_IMAGE__
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode __XCODE_MAJOR__
        run: |
          XCODE_APP="$(ls -d /Applications/Xcode___XCODE_MAJOR__*.app | sort -V | tail -1)"
          echo "Selected: $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      - name: Install tools
        run: brew install xcodegen xcbeautify

      - name: Import signing assets
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_P12_PASSWORD }}
          IOS_ADHOC_PROFILE_BASE64: ${{ secrets.IOS_ADHOC_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo -n "$IOS_DIST_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          echo -n "$IOS_ADHOC_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"

          # Dedicated ephemeral keychain so codesign can use the cert
          # without any UI prompt. set-key-partition-list is the
          # load-bearing line — without it codesign hangs forever on a
          # GUI password prompt no headless runner can answer.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/dist.p12" \
            -k "$KEYCHAIN_PATH" -P "$IOS_DIST_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # Install the profile where Xcode looks for it (both the modern
          # and legacy locations), and export its name for the build steps.
          security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$RUNNER_TEMP/profile.plist")"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$RUNNER_TEMP/profile.plist")"
          for DIR in \
            "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" \
            "$HOME/Library/MobileDevice/Provisioning Profiles"; do
            mkdir -p "$DIR"
            cp "$RUNNER_TEMP/profile.mobileprovision" "$DIR/$PROFILE_UUID.mobileprovision"
          done
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed profile: $PROFILE_NAME ($PROFILE_UUID)"

          # Signing settings go through the app target's xcconfig, not
          # xcodebuild arguments: command-line build settings are global
          # and SPM macro/package targets reject provisioning profiles.
          cat > __IOS_DIR__/Signing.xcconfig <<EOF
          CODE_SIGN_STYLE = Manual
          DEVELOPMENT_TEAM = $APPLE_TEAM_ID
          CODE_SIGN_IDENTITY = Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER = $PROFILE_NAME
          EOF

      # Delete if the repo checks in its .xcodeproj (and remove xcodegen
      # from the brew install above). Must run AFTER the xcconfig write.
      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: __IOS_DIR__

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project __IOS_DIR__/__PROJECT_NAME__.xcodeproj \
            -scheme __SCHEME__ \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/__PROJECT_NAME__.xcarchive" \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            2>&1 | xcbeautify --renderer github-actions

      # "release-testing" is the Xcode 15.4+ name for the ad-hoc method.
      - name: Export ad-hoc IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>release-testing</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>__BUNDLE_ID__</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/__PROJECT_NAME__.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            2>&1 | xcbeautify --renderer github-actions
          ls -la "$RUNNER_TEMP/export"

      # Debugging escape hatch: inspect/re-sign the IPA without Firebase.
      - name: Upload IPA as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: __PROJECT_NAME__-ipa
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 14

      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          npm install -g firebase-tools
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          IPA="$(ls "$RUNNER_TEMP/export"/*.ipa | head -1)"
          firebase appdistribution:distribute "$IPA" \
            --app "$FIREBASE_APP_ID" \
            --groups "__TESTER_GROUP__" \
            --release-notes "$(git log -1 --pretty=%s) ($(git rev-parse --short HEAD))"
